name: Project Checks

on:
  push:
    branches: [main, ten-out-of-ten-upgrade]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  project-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build processed data
        run: python src/data_pipeline.py

      - name: Validate data
        run: python src/validate_data.py

      - name: Train model
        run: python src/risk_model.py

      - name: Generate AI-style summaries
        run: python src/ai_summary.py

      - name: Run tests
        run: pytest
